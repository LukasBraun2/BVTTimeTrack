<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tempo — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg0:#0A0B0F;--bg1:#0F1117;--bg2:#161820;--bg3:#1D1F2A;--bg4:#252837;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
    --t0:#F0F0F5;--t1:#9B9DB0;--t2:#5A5C70;
    --accent:#F5A623;--green:#22C97A;--red:#F05C5C;
  }
  body{background:var(--bg0);color:var(--t0);font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh;}
  .mono{font-family:'Geist Mono',monospace;font-variant-numeric:tabular-nums;}
  ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}

  /* ── Login ── */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:40px 48px;width:380px;box-shadow:0 40px 80px rgba(0,0,0,.5);text-align:center;}
  .logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px;}
  .logo-icon{width:36px;height:36px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
  .logo-text{font-size:22px;font-weight:700;letter-spacing:-.02em;}
  .login-card h1{font-size:18px;font-weight:600;margin-bottom:8px;letter-spacing:-.01em;}
  .login-card p{font-size:13px;color:var(--t2);margin-bottom:28px;line-height:1.6;}
  .field{margin-bottom:10px;text-align:left;}
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t2);margin-bottom:6px;}
  .field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--t0);font-family:inherit;outline:none;transition:border-color .15s;}
  .field input:focus{border-color:rgba(245,166,35,.5);}
  .login-btn{width:100%;background:var(--accent);color:#0A0B0F;border:none;border-radius:8px;padding:11px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:8px;}
  .login-btn:hover{opacity:.88;}
  .login-btn:disabled{opacity:.45;cursor:not-allowed;}
  .err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px;text-align:left;}
  .badge-admin{display:inline-flex;align-items:center;gap:5px;background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:20px;}

  /* ── App shell ── */
  #app{display:none;flex-direction:column;min-height:100vh;}
  header{background:var(--bg1);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  header .brand{display:flex;align-items:center;gap:9px;}
  header .brand-icon{width:24px;height:24px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
  header h1{font-size:14px;font-weight:600;letter-spacing:-.01em;}
  .header-right{display:flex;align-items:center;gap:16px;}
  .admin-chip{font-size:11px;color:var(--t2);}
  .signout-btn{background:none;border:1px solid var(--border2);border-radius:7px;padding:6px 14px;font-family:inherit;font-size:12px;color:var(--t1);cursor:pointer;transition:all .15s;}
  .signout-btn:hover{background:var(--bg3);color:var(--t0);}

  /* ── Stats bar ── */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:24px 28px 0;}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
  .stat-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:10px;}
  .stat-val{font-size:26px;font-weight:400;color:var(--t0);margin-bottom:4px;}
  .stat-sub{font-size:12px;color:var(--t2);}

  /* ── Controls ── */
  .controls{display:flex;align-items:center;gap:12px;padding:20px 28px;}
  .search-wrap{position:relative;flex:1;max-width:320px;}
  .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t2);}
  .search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 34px;font-size:13px;color:var(--t0);font-family:inherit;outline:none;transition:border-color .15s;}
  .search-wrap input:focus{border-color:rgba(245,166,35,.4);}
  .filter-select{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--t1);font-family:inherit;outline:none;cursor:pointer;}
  .filter-select:focus{border-color:rgba(245,166,35,.4);}
  .filter-select option{background:var(--bg3);}

  /* ── Student table ── */
  .table-wrap{padding:0 28px 28px;flex:1;}
  .student-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
  .student-header{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;transition:background .1s;user-select:none;}
  .student-header:hover{background:var(--bg3);}
  .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
  .student-info{flex:1;min-width:0;}
  .student-name{font-size:14px;font-weight:500;color:var(--t0);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .student-email{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .student-stats{display:flex;gap:20px;align-items:center;flex-shrink:0;}
  .sstats-item{text-align:right;}
  .sstats-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;}
  .sstats-val{font-size:13px;font-weight:500;color:var(--t0);}
  .chevron{color:var(--t2);transition:transform .2s;flex-shrink:0;}
  .chevron.open{transform:rotate(180deg);}

  /* ── Entry rows ── */
  .entries-wrap{border-top:1px solid var(--border);display:none;}
  .entries-wrap.open{display:block;}
  .proj-bar{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:8px;}
  .proj-pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}
  .entry-row{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border);font-size:13px;}
  .entry-row:last-child{border-bottom:none;}
  .entry-row:hover{background:var(--bg3);}
  .entry-dot{width:3px;height:30px;border-radius:2px;flex-shrink:0;}
  .entry-desc{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t0);}
  .tag-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--bg4);color:var(--t2);border:1px solid var(--border);}
  .entry-time{font-size:11.5px;color:var(--t2);min-width:110px;text-align:right;flex-shrink:0;}
  .entry-dur{font-size:13px;font-weight:500;color:var(--t0);min-width:72px;text-align:right;flex-shrink:0;}
  .no-entries{padding:24px 18px;text-align:center;color:var(--t2);font-size:13px;}
  .loading{text-align:center;padding:80px;color:var(--t2);font-size:14px;}

  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .fadeIn{animation:fadeIn .25s ease;}

  .c-academy{color:#818CF8;} .bg-academy{background:rgba(129,140,248,.15);border-color:rgba(129,140,248,.4);}
  .c-volunteer{color:#22C97A;} .bg-volunteer{background:rgba(34,201,122,.15);border-color:rgba(34,201,122,.4);}
  .c-module5{color:#F5A623;} .bg-module5{background:rgba(245,166,35,.15);border-color:rgba(245,166,35,.4);}

  @media(max-width:900px){
    .stats-bar{grid-template-columns:repeat(2,1fr);padding:16px 16px 0;}
    .controls{padding:14px 16px;flex-wrap:wrap;}
    .search-wrap{max-width:100%;flex:1 1 100%;}
    .table-wrap{padding:0 16px 24px;}
    header{padding:0 16px;}
    .student-stats{gap:12px;}
    .sstats-item:nth-child(-n+3){display:none;}
    .entry-time{min-width:90px;}
    .entry-dur{min-width:58px;}
  }
  @media(max-width:600px){
    .login-card{width:calc(100vw - 32px);padding:28px 24px;}
    .stats-bar{grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 12px 0;}
    .stat-card{padding:14px 14px;}
    .stat-val{font-size:20px;}
    .controls{padding:10px 12px;gap:8px;}
    .filter-select{flex:1;}
    .table-wrap{padding:0 12px 20px;}
    header{padding:0 12px;height:48px;}
    header h1{font-size:13px;}
    .admin-chip{display:none;}
    .last-updated-wrap{display:none;}
    .signout-btn{padding:5px 10px;font-size:11px;}
    .student-header{flex-wrap:wrap;gap:10px;padding:12px 14px;}
    .student-info{flex:1;}
    .student-stats{width:100%;border-top:1px solid var(--border);padding-top:10px;margin-top:2px;justify-content:flex-start;gap:16px;}
    .sstats-item{display:block !important;text-align:left;}
    .chevron{align-self:flex-start;margin-top:4px;}
    .entry-row{flex-wrap:wrap;gap:6px;padding:10px 12px;}
    .entry-dot{height:20px;align-self:flex-start;margin-top:3px;}
    .entry-desc{flex:1 1 calc(100% - 20px);}
    .entry-time{min-width:unset;text-align:left;width:100%;padding-left:15px;}
    .entry-dur{min-width:unset;text-align:left;}
  }
</style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card fadeIn">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#0A0B0F" stroke-width="1.6"/><path d="M7 4v3.5l2 1.5" stroke="#0A0B0F" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <span class="logo-text">Tempo</span>
    </div>
    <div class="badge-admin">⬡ Admin Portal</div>
    <h1>Instructor access</h1>
    <p>Enter the admin password to view all student time tracking reports.</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()"/>
    </div>
    <div class="err" id="pw-err"></div>
    <button class="login-btn" id="login-btn" onclick="tryLogin()">Sign in</button>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#0A0B0F" stroke-width="1.6"/><path d="M7 4v3.5l2 1.5" stroke="#0A0B0F" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <h1>Tempo — Admin</h1>
    </div>
    <div class="header-right">
      <div class="last-updated-wrap"><span id="last-updated" style="font-size:11px;color:var(--t2);"></span></div>
      <span class="admin-chip" id="admin-label">Admin</span>
      <button class="signout-btn" onclick="signOutAdmin()">Sign out</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Total students</div><div class="stat-val mono" id="stat-students">—</div><div class="stat-sub">logged in</div></div>
    <div class="stat-card"><div class="stat-label">Hours this week</div><div class="stat-val mono" id="stat-week">—</div><div class="stat-sub">across all students</div></div>
    <div class="stat-card"><div class="stat-label">Total entries</div><div class="stat-val mono" id="stat-entries">—</div><div class="stat-sub">all time</div></div>
    <div class="stat-card"><div class="stat-label">Avg this week</div><div class="stat-val mono" id="stat-avg">—</div><div class="stat-sub">per active student</div></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search students…" id="search-input" oninput="debouncedLoad()"/>
    </div>
    <!-- Project filter options injected from /api/config -->
    <select class="filter-select" id="proj-filter" onchange="loadData()">
      <option value="">All projects</option>
    </select>
    <select class="filter-select" id="week-filter" onchange="loadData()">
      <option value="week">This week</option>
      <option value="all">All time</option>
    </select>
  </div>

  <div class="table-wrap">
    <div id="student-list"><div class="loading">Loading student data…</div></div>
  </div>
</div>

<script>
const API = window.location.origin;

// ── App constants — fetched from /api/config ──────────────────────────────────
let PROJECTS = {};

async function loadConfig() {
  try {
    const res = await fetch(`${API}/api/config`);
    const cfg = await res.json();
    PROJECTS = cfg.projects;

    // Populate project filter <select>
    const sel = document.getElementById("proj-filter");
    Object.entries(PROJECTS).forEach(([id, p]) => {
      const opt = document.createElement("option");
      opt.value = id; opt.textContent = p.name;
      sel.appendChild(opt);
    });
  } catch (e) {
    console.error("Failed to load config:", e);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt          = s => { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60; return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`; };
const fmtShort     = s => { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}h ${m}m`:`${m}m`; };
const fmtTime      = d => new Date(d).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const fmtDateShort = d => new Date(d).toLocaleDateString([],{month:"short",day:"numeric"});
const initials     = name => (name||"?").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
const COLORS       = ["#818CF8","#22C97A","#F5A623","#38BDF8","#F472B6","#FB923C","#A78BFA","#34D399"];
const userColor    = email => COLORS[Math.abs([...email].reduce((a,c)=>a+c.charCodeAt(0),0))%COLORS.length];

let expandedUsers = new Set();

// ── Login — now sets a server-side session cookie ─────────────────────────────
window.tryLogin = async () => {
  const pw  = document.getElementById("pw-input").value;
  const err = document.getElementById("pw-err");
  const btn = document.getElementById("login-btn");

  err.textContent = "";
  if (!pw) { err.textContent = "Please enter the admin password."; return; }

  btn.disabled = true; btn.textContent = "Signing in…";

  try {
    const res = await fetch(`${API}/api/auth/admin`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    if (!res.ok) throw new Error("wrong");
    showApp();
  } catch (e) {
    err.textContent = "Incorrect password. Try again.";
    btn.disabled = false; btn.textContent = "Sign in";
    document.getElementById("pw-input").value = "";
  }
};

window.signOutAdmin = async () => {
  await fetch(`${API}/api/auth/admin/logout`, { method: "POST" });
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app").style.display          = "none";
};

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display          = "flex";
  loadData();
}

// Auto-restore: check if session is still valid on load
(async function checkSession() {
  try {
    const res = await fetch(`${API}/api/auth/admin/check`);
    const { ok } = await res.json();
    if (ok) showApp();
  } catch {}
})();

// ── Data loading — all aggregation happens server-side ────────────────────────
async function loadStats() {
  try {
    const res = await fetch(`${API}/api/admin/stats`);
    if (!res.ok) { signOutAdmin(); return; }
    const s = await res.json();
    document.getElementById("stat-students").textContent = s.totalStudents;
    document.getElementById("stat-week").textContent     = fmtShort(s.weekSeconds);
    document.getElementById("stat-entries").textContent  = s.totalEntries;
    document.getElementById("stat-avg").textContent      = fmtShort(s.avgWeekSeconds);
  } catch (e) { console.error("Failed to load stats:", e); }
}

async function loadStudents() {
  const search  = document.getElementById("search-input").value;
  const project = document.getElementById("proj-filter").value;
  const period  = document.getElementById("week-filter").value;

  const params = new URLSearchParams({ project, period, search });
  try {
    const res = await fetch(`${API}/api/admin/students?${params}`);
    if (!res.ok) { signOutAdmin(); return; }
    const students = await res.json();
    renderStudents(students, period);
    document.getElementById("last-updated").textContent =
      "Updated " + new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  } catch (e) {
    console.error("Failed to load students:", e);
    document.getElementById("student-list").innerHTML = '<div class="loading">Failed to load. Is the server running?</div>';
  }
}

function loadData() {
  loadStats();
  loadStudents();
}

// Debounce search input so we don't fire on every keystroke
let searchTimer;
function debouncedLoad() { clearTimeout(searchTimer); searchTimer = setTimeout(loadStudents, 250); }

// Auto-refresh every 30 s
setInterval(() => {
  // Only refresh if the app panel is visible
  if (document.getElementById("app").style.display !== "none") loadData();
}, 30000);

// ── Render — pure presentation, no aggregation ────────────────────────────────
function renderStudents(students, period) {
  if (students.length === 0) {
    document.getElementById("student-list").innerHTML = '<div class="loading">No students found.</div>';
    return;
  }

  document.getElementById("student-list").innerHTML = students.map(u => {
    const isOpen = expandedUsers.has(u.uid);
    const col    = userColor(u.email);

    const projBreakdownHtml = u.projBreakdown.length > 0
      ? `<div class="proj-bar">${u.projBreakdown.map(([pid, secs]) => {
          const p = PROJECTS[pid];
          return p ? `<span class="proj-pill bg-${p.cls} c-${p.cls}">${p.name} · ${fmtShort(secs)}</span>` : "";
        }).join("")}</div>`
      : "";

    const entryRows = u.entries.map(e => {
      const p = PROJECTS[e.projectId];
      return `
        <div class="entry-row">
          <div class="entry-dot" style="background:${p?.color||"#444"}"></div>
          <div style="flex:1;min-width:0;">
            <div class="entry-desc">${e.desc||"Untitled"}</div>
            <div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;">
              ${p?`<span style="font-size:11px;color:${p.color};font-weight:500;">${p.name}</span>`:""}
              ${(e.tags||[]).map(t=>`<span class="tag-pill">${t}</span>`).join("")}
            </div>
          </div>
          <div class="entry-time mono">${fmtDateShort(e.start)} · ${fmtTime(e.start)}–${fmtTime(e.end)}</div>
          <div class="entry-dur mono">${fmt(e.duration)}</div>
        </div>`;
    }).join("");

    // Top-3 project breakdown columns in student header
    const projCols = u.projBreakdown.slice(0, 3).map(([pid, secs]) => {
      const p = PROJECTS[pid];
      return p ? `<div class="sstats-item"><div class="sstats-label">${p.name}</div><div class="sstats-val mono" style="color:${p.color}">${fmtShort(secs)}</div></div>` : "";
    }).join("");

    return `
      <div class="student-card fadeIn">
        <div class="student-header" onclick="toggleStudent('${u.uid}')">
          <div class="avatar" style="background:${col}20;color:${col};">${initials(u.name)}</div>
          <div class="student-info">
            <div class="student-name">${u.name}</div>
            <div class="student-email">${u.email}</div>
          </div>
          <div class="student-stats">
            ${projCols}
            <div class="sstats-item">
              <div class="sstats-label">${period==="week"?"This week":"Total"}</div>
              <div class="sstats-val mono">${fmtShort(u.totalSeconds)}</div>
            </div>
            <div class="sstats-item">
              <div class="sstats-label">Entries</div>
              <div class="sstats-val mono">${u.totalEntries}</div>
            </div>
          </div>
          <svg class="chevron${isOpen?" open":""}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="entries-wrap${isOpen?" open":""}">
          ${projBreakdownHtml}
          ${u.totalEntries===0?'<div class="no-entries">No entries for this period.</div>':entryRows}
          ${u.totalEntries>50?`<div class="no-entries" style="font-size:12px;">Showing first 50 of ${u.totalEntries} entries.</div>`:""}
        </div>
      </div>`;
  }).join("");
}

window.toggleStudent = uid => {
  if (expandedUsers.has(uid)) expandedUsers.delete(uid);
  else expandedUsers.add(uid);
  // Re-render with cached data to avoid a round-trip just for expand/collapse
  loadStudents();
};

// ── Boot ──────────────────────────────────────────────────────────────────────
loadConfig();
</script>
</body>
</html>
