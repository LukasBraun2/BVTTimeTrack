<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tempo — Admin</title>
<link rel="stylesheet" href="admin-styles.css"/>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card fadeIn">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#0A0B0F" stroke-width="1.6"/><path d="M7 4v3.5l2 1.5" stroke="#0A0B0F" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <span class="logo-text">Tempo</span>
    </div>
    <div class="badge-admin">&#x2B21; Admin Portal</div>
    <h1>Instructor access</h1>
    <p>Enter the admin password to view all student time tracking reports.</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pw-input" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" onkeydown="if(event.key==='Enter')tryLogin()"/>
    </div>
    <div class="err" id="pw-err"></div>
    <button class="login-btn" id="login-btn" onclick="tryLogin()">Sign in</button>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#0A0B0F" stroke-width="1.6"/><path d="M7 4v3.5l2 1.5" stroke="#0A0B0F" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <h1>Tempo &#x2014; Admin</h1>
    </div>
    <div class="header-right">
      <div class="last-updated-wrap"><span id="last-updated" style="font-size:11px;color:var(--t2);"></span></div>
      <span class="admin-chip" id="admin-label">Admin</span>
      <button class="signout-btn" onclick="signOutAdmin()">Sign out</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Total students</div><div class="stat-val mono" id="stat-students">&#x2014;</div><div class="stat-sub">logged in</div></div>
    <div class="stat-card"><div class="stat-label">Hours this week</div><div class="stat-val mono" id="stat-week">&#x2014;</div><div class="stat-sub">across all students</div></div>
    <div class="stat-card"><div class="stat-label">Total entries</div><div class="stat-val mono" id="stat-entries">&#x2014;</div><div class="stat-sub">all time</div></div>
    <div class="stat-card"><div class="stat-label">Avg this week</div><div class="stat-val mono" id="stat-avg">&#x2014;</div><div class="stat-sub">per active student</div></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search students..." id="search-input" oninput="debouncedLoad()"/>
    </div>
    <!-- Project filter options injected from /api/config/ui -->
    <select class="filter-select" id="proj-filter" onchange="loadData()">
      <option value="">All projects</option>
    </select>
    <select class="filter-select" id="week-filter" onchange="loadData()">
      <option value="week">This week</option>
      <option value="all">All time</option>
    </select>
  </div>

  <div class="table-wrap">
    <div id="student-list"><div class="loading">Loading student data...</div></div>
  </div>
</div>

<script>
const API = window.location.origin;

let expandedUsers = new Set();
// Cache: uid → { entries, totalEntries } — cleared whenever filters change
let entryCache = {};

async function loadConfig() {
  try {
    const res = await fetch(`${API}/api/config/ui`);
    const ui  = await res.json();
    document.getElementById("proj-filter").innerHTML =
      `<option value="">All projects</option>` +
      ui.projects.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
  } catch(e) { console.error("Failed to load config:", e); }
}

// ── Login ─────────────────────────────────────────────────────────────────────
window.tryLogin = async () => {
  const pw  = document.getElementById("pw-input").value;
  const err = document.getElementById("pw-err");
  const btn = document.getElementById("login-btn");
  err.textContent = "";
  if (!pw) { err.textContent = "Please enter the admin password."; return; }
  btn.disabled = true; btn.textContent = "Signing in...";
  try {
    const res = await fetch(`${API}/api/auth/admin`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    if (!res.ok) throw new Error("wrong");
    showApp();
  } catch(e) {
    err.textContent = "Incorrect password. Try again.";
    btn.disabled = false; btn.textContent = "Sign in";
    document.getElementById("pw-input").value = "";
  }
};

window.signOutAdmin = async () => {
  await fetch(`${API}/api/auth/admin/logout`, { method: "POST" });
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app").style.display          = "none";
};

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display          = "flex";
  loadData();
}

(async function checkSession() {
  try {
    const res = await fetch(`${API}/api/auth/admin/check`);
    const { ok } = await res.json();
    if (ok) showApp();
  } catch {}
})();

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const res = await fetch(`${API}/api/admin/stats`);
    if (!res.ok) { signOutAdmin(); return; }
    const s = await res.json();
    document.getElementById("stat-students").textContent = s.totalStudents;
    document.getElementById("stat-week").textContent     = s.weekFormatted;
    document.getElementById("stat-entries").textContent  = s.totalEntries;
    document.getElementById("stat-avg").textContent      = s.avgWeekFormatted;
  } catch(e) { console.error("Failed to load stats:", e); }
}

async function loadStudents() {
  const search  = document.getElementById("search-input").value;
  const project = document.getElementById("proj-filter").value;
  const period  = document.getElementById("week-filter").value;
  try {
    const res = await fetch(`${API}/api/admin/students?` + new URLSearchParams({ project, period, search }));
    if (!res.ok) { signOutAdmin(); return; }
    const students = await res.json();
    renderStudents(students, period);
    document.getElementById("last-updated").textContent =
      "Updated " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  } catch(e) {
    console.error("Failed to load students:", e);
    document.getElementById("student-list").innerHTML = '<div class="loading">Failed to load. Is the server running?</div>';
  }
}

function loadData() { entryCache = {}; loadStats(); loadStudents(); }

let searchTimer;
function debouncedLoad() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { entryCache = {}; loadStudents(); }, 250);
}

setInterval(() => {
  if (document.getElementById("app").style.display !== "none") loadData();
}, 30000);

// ── Fetch entries for one student (with cache) ────────────────────────────────
async function fetchEntries(uid) {
  if (entryCache[uid]) return entryCache[uid];
  const project = document.getElementById("proj-filter").value;
  const period  = document.getElementById("week-filter").value;
  const res = await fetch(`${API}/api/admin/students/${uid}/entries?` + new URLSearchParams({ project, period }));
  if (!res.ok) throw new Error("Failed to load entries");
  const data = await res.json();
  entryCache[uid] = data;
  return data;
}

// ── Render — avatar color and initials are pre-computed server-side ───────────
function renderStudents(students, period) {
  if (students.length === 0) {
    document.getElementById("student-list").innerHTML = '<div class="loading">No students found.</div>';
    return;
  }

  document.getElementById("student-list").innerHTML = students.map(u => {
    const isOpen = expandedUsers.has(u.uid);
    const col    = u.avatarColor;

    const projCols = u.projBreakdown.slice(0, 3).map(p =>
      `<div class="sstats-item"><div class="sstats-label">${p.name}</div><div class="sstats-val mono" style="color:${p.color}">${p.formatted}</div></div>`
    ).join("");

    // Entries section: show cached content if available, loading state otherwise
    let entriesContent;
    if (!isOpen) {
      entriesContent = "";
    } else if (entryCache[u.uid]) {
      entriesContent = renderEntriesContent(u, entryCache[u.uid]);
    } else {
      entriesContent = '<div class="no-entries">Loading…</div>';
    }

    return `
      <div class="student-card fadeIn" id="card-${u.uid}">
        <div class="student-header" onclick="toggleStudent('${u.uid}')">
          <div class="avatar" style="background:${col}20;color:${col};">${u.initials}</div>
          <div class="student-info">
            <div class="student-name">${u.displayName}</div>
          </div>
          <div class="student-stats">
            ${projCols}
            <div class="sstats-item">
              <div class="sstats-label">${period==="week"?"This week":"Total"}</div>
              <div class="sstats-val mono">${u.totalFormatted}</div>
            </div>
            <div class="sstats-item">
              <div class="sstats-label">Entries</div>
              <div class="sstats-val mono">${u.totalEntries}</div>
            </div>
          </div>
          <svg class="chevron${isOpen?" open":""}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="entries-wrap${isOpen?" open":""}" id="entries-${u.uid}">
          ${entriesContent}
        </div>
      </div>`;
  }).join("");
}

function renderEntriesContent(u, { entries, totalEntries }) {
  const projBreakdownHtml = u.projBreakdown.length > 0
    ? `<div class="proj-bar">${u.projBreakdown.map(p =>
        `<span class="proj-pill bg-${p.cls} c-${p.cls}">${p.name} &middot; ${p.formatted}</span>`
      ).join("")}</div>`
    : "";

  const entryRows = entries.map(e => `
    <div class="entry-row">
      <div class="entry-dot" style="background:${e.projectColor||"#444"}"></div>
      <div style="flex:1;min-width:0;">
        <div class="entry-desc">${e.desc||"Untitled"}</div>
        <div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;">
          ${e.projectName?`<span style="font-size:11px;color:${e.projectColor};font-weight:500;">${e.projectName}</span>`:""}
          ${(e.tags||[]).map(t=>`<span class="tag-pill">${t}</span>`).join("")}
        </div>
      </div>
      <div class="entry-time mono">${e.dateShort} &middot; ${e.startFormatted}&ndash;${e.endFormatted}</div>
      <div class="entry-dur mono">${e.durationFormatted}</div>
    </div>`).join("");

  return `
    ${projBreakdownHtml}
    ${totalEntries===0?'<div class="no-entries">No entries for this period.</div>':entryRows}
    ${totalEntries>50?`<div class="no-entries" style="font-size:12px;">Showing first 50 of ${totalEntries} entries.</div>`:""}`;
}

window.toggleStudent = async uid => {
  if (expandedUsers.has(uid)) {
    expandedUsers.delete(uid);
    // Collapse without a full re-render
    const wrap    = document.getElementById(`entries-${uid}`);
    const chevron = document.querySelector(`#card-${uid} .chevron`);
    if (wrap)    { wrap.classList.remove("open"); wrap.innerHTML = ""; }
    if (chevron)  chevron.classList.remove("open");
    return;
  }

  // Expand: show card immediately, then fill entries async
  expandedUsers.add(uid);
  const wrap    = document.getElementById(`entries-${uid}`);
  const chevron = document.querySelector(`#card-${uid} .chevron`);
  if (wrap)    { wrap.innerHTML = '<div class="no-entries">Loading…</div>'; wrap.classList.add("open"); }
  if (chevron)  chevron.classList.add("open");

  try {
    // Find the student's summary data (already in the DOM) for projBreakdown
    const studentEl = document.getElementById(`card-${uid}`);
    // Re-fetch the current student list to get projBreakdown for this uid
    // (it's cheap — already cached by the browser for this render cycle,
    //  so we read it from the last known students array instead)
    const data = await fetchEntries(uid);
    if (wrap && expandedUsers.has(uid)) {
      // Get projBreakdown from the rendered student list via a lightweight approach:
      // pull it from the global lastStudents cache set during renderStudents
      const u = lastStudents.find(s => s.uid === uid);
      wrap.innerHTML = u ? renderEntriesContent(u, data) : renderEntriesContent({ projBreakdown: [] }, data);
    }
  } catch(e) {
    console.error("Failed to load entries:", e);
    if (wrap) wrap.innerHTML = '<div class="no-entries">Failed to load entries.</div>';
  }
};

// Keep a reference to the last-rendered student summaries for toggleStudent to use
let lastStudents = [];
const _origRender = renderStudents;
// Wrap renderStudents to capture lastStudents
(function() {
  const orig = renderStudents;
  window.renderStudents = function(students, period) {
    lastStudents = students;
    orig(students, period);
  };
})();

loadConfig();
</script>
</body>
</html>
